# =============================================================================
# Bedrock AgentCore Configuration
# =============================================================================
#
# This file configures the MCP server for deployment to AWS Bedrock AgentCore.
# See: https://docs.aws.amazon.com/bedrock/latest/userguide/agentcore.html

# AgentCore runtime name (must match Terraform configuration)
runtime_name: salesforce-mcp-server

# Container configuration
container:
  # ECR repository URI (populated by Terraform output)
  # repository: <account>.dkr.ecr.<region>.amazonaws.com/bedrock-agentcore-salesforce-mcp-server-dev
  tag: latest
  architecture: ARM64  # or X86_64

# Network configuration
network:
  mode: PUBLIC  # PUBLIC or VPC

# Server configuration
server:
  host: 0.0.0.0
  port: 8000
  path: /mcp
  transport: streamable-http
  stateless: true

# Environment variables (non-sensitive — credentials come from Secrets Manager)
environment:
  MCP_SERVER_NAME: salesforce-mcp-server
  MCP_LOG_LEVEL: INFO
  MCP_LOG_FORMAT: json

# Secrets (reference AWS Secrets Manager)
secrets:
  # API keys and Salesforce credentials are retrieved from Secrets Manager at runtime
  # secret_name: mcp/salesforce-mcp-server/api-keys
